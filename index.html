<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;900&family=Barlow:wght@500;700&display=swap');
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Barlow',sans-serif;background:#f0f0f0;padding:12px;max-width:680px;margin:0 auto;}

  /* Header */
  .page-title{font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:.12em;color:#F07020;margin-bottom:12px;}

  /* Cards */
  .card{background:#fff;border-radius:10px;padding:14px;margin-bottom:10px;border:1px solid #e0e0e0;}
  .card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:0;}
  .card-title{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:#888;}
  .card-body{margin-top:12px;}

  /* Collapsible */
  .collapsible .card-header{cursor:pointer;user-select:none;}
  .collapsible .card-header::after{content:'▾';font-size:14px;color:#bbb;transition:.2s;}
  .collapsible.collapsed .card-header::after{content:'▸';}
  .collapsible.collapsed .card-body{display:none;}

  /* Inline grid for compact rows */
  .row{display:grid;gap:8px;margin-bottom:8px;}
  .row:last-child{margin-bottom:0;}
  .row.cols-2{grid-template-columns:1fr 1fr;}
  .row.cols-3{grid-template-columns:1fr 1fr 1fr;}
  .row.cols-4{grid-template-columns:1fr 1fr 1fr 1fr;}

  /* Stat row: label+toggle on top, inputs below */
  .stat-row{background:#f8f8f8;border-radius:7px;padding:8px 10px;margin-bottom:8px;border:1px solid #ebebeb;display:flex;align-items:center;gap:8px;}
  .stat-row:last-child{margin-bottom:0;}
  .stat-row .toggle{flex-shrink:0;}
  .stat-inputs{display:grid;gap:8px;flex:1;}
  .stat-inputs.single{grid-template-columns:1fr 1fr;}
  .stat-inputs.triple{grid-template-columns:1fr 1fr 1fr;}
  .stat-inputs.triple .ig-pct{}
  .stat-inputs.triple .ig-sub{display:contents;}

  /* Input groups */
  .ig{display:flex;flex-direction:column;gap:3px;}
  .ig label{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:#aaa;}
  .ig input,.ig select{border:1px solid #ddd;border-radius:5px;padding:7px 8px;font-size:14px;font-family:'Barlow',sans-serif;background:#fff;color:#111;width:100%;}
  .ig input:focus,.ig select:focus{outline:none;border-color:var(--accent, #F07020);}

  /* Toggle switch */
  .toggle{position:relative;display:inline-block;width:36px;height:20px;flex-shrink:0;}
  .toggle input{opacity:0;width:0;height:0;}
  .slider{position:absolute;cursor:pointer;inset:0;background:#ddd;border-radius:20px;transition:.25s;}
  .slider:before{position:absolute;content:"";height:14px;width:14px;left:3px;bottom:3px;background:#fff;border-radius:50%;transition:.25s;}
  input:checked+.slider{background:var(--accent, #F07020);}
  input:checked+.slider:before{transform:translateX(16px);}

  /* Top controls bar */
  .controls-bar{display:flex;flex-wrap:wrap;gap:12px;align-items:center;background:#fff;border-radius:10px;padding:12px 14px;margin-bottom:10px;border:1px solid #e0e0e0;}
  .ctrl-group{display:flex;align-items:center;gap:7px;}
  .ctrl-group label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:#888;white-space:nowrap;}
  .ctrl-group select{border:1px solid #ddd;border-radius:5px;padding:5px 8px;font-size:13px;font-family:'Barlow',sans-serif;background:#fff;color:#111;cursor:pointer;}
  .ctrl-sep{width:1px;height:22px;background:#e8e8e8;}

  /* Upload zone */
  .upload-zone{border:2px dashed #ddd;border-radius:8px;padding:14px;text-align:center;cursor:pointer;background:#fafafa;margin-bottom:10px;position:relative;}
  .upload-zone:hover{border-color:var(--accent, #F07020);}
  .upload-zone input[type="file"]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%;}
  .upload-label{font-size:13px;color:#999;pointer-events:none;}
  .upload-label span{color:#F07020;font-weight:700;}
  .preview-thumb{max-height:50px;border-radius:4px;display:block;margin:0 auto 6px;}

  /* Button */
  .btn{background:#F07020;color:#fff;border:none;border-radius:8px;padding:14px;font-family:'Barlow Condensed',sans-serif;font-size:18px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;cursor:pointer;width:100%;margin-bottom:14px;}
  .btn:hover{background:#D95F10;}

  /* Canvas / output */
  canvas{width:100%;height:auto;border-radius:10px;display:block;max-width:100%;}
  #cardWrap{display:none;max-width:720px;margin:0 auto;overflow:hidden;}
  .platform-bar{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:10px;}
  .plat-btn{flex:1;min-width:0;border:2px solid #ddd;border-radius:7px;padding:7px 6px;background:#fff;cursor:pointer;text-align:center;font-family:'Barlow',sans-serif;transition:.15s;}
  .plat-btn:hover{border-color:var(--accent,#F07020);}
  .plat-btn.active{border-color:var(--accent,#F07020);background:var(--accent,#F07020);color:#fff;}
  .plat-btn .plat-name{display:block;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;}
  .share-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px;}
  .share-btn{border:none;border-radius:7px;padding:0;height:42px;font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;cursor:pointer;text-align:center;text-decoration:none;display:flex;align-items:center;justify-content:center;line-height:1;box-sizing:border-box;width:100%;}
  .share-btn.download{background:#111;color:#fff;}
  .share-btn.download:hover{background:#333;}
  .share-btn.share{background:var(--accent,#F07020);color:#fff;}
  .share-btn.share:hover{filter:brightness(.88);}

  /* Color theme swatches */
  .swatch-wrap{display:flex;gap:5px;align-items:center;flex-wrap:wrap;}
  .swatch{width:20px;height:20px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:.15s;flex-shrink:0;}
  .swatch.active,.swatch:hover{border-color:#333;transform:scale(1.15);}
  .swatch-custom{width:20px;height:20px;border-radius:50%;cursor:pointer;border:2px solid #ccc;flex-shrink:0;overflow:hidden;position:relative;transition:.15s;}
  .swatch-custom:hover{border-color:#333;transform:scale(1.15);}
  .swatch-custom.active{border-color:#333;transform:scale(1.15);}
  .swatch-custom input[type="color"]{position:absolute;inset:-4px;width:calc(100% + 8px);height:calc(100% + 8px);border:none;padding:0;cursor:pointer;opacity:0;}

  .bot-stat-ig{display:flex;flex-direction:column;gap:3px;}
  .bot-stat-ig .lbl-row{display:flex;align-items:center;justify-content:space-between;gap:4px;}
  .bot-stat-ig .lbl-row label{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:#aaa;}

  /* Responsive fixes for mobile */
  @media (max-width: 520px) {
    /* Bottom bar: stack stats vertically */
    #bottomBarLeague .row, #bottomBarTournament .row{grid-template-columns:1fr;}
    /* Top bar info rows */
    .row.cols-4{grid-template-columns:1fr 1fr;}
    /* Controls bar */
    .controls-bar{gap:8px;}
    .ctrl-sep{display:none;}
    /* Triple stat rows: all fields same width (2-col grid, % no longer full-width) */
    .stat-inputs.triple{grid-template-columns:1fr 1fr;}
    .stat-inputs.triple .ig-pct{grid-column:1;}
    .stat-inputs.triple .ig:nth-child(2){grid-column:1;}
    .stat-inputs.single{grid-template-columns:1fr 1fr;}
  }
  @media (max-width: 360px) {
    .row.cols-2,.row.cols-4{grid-template-columns:1fr;}
    .stat-inputs.single{grid-template-columns:1fr;}
    .stat-inputs.triple{grid-template-columns:1fr 1fr;}
  }
</style>
</head>
<body>
<div class="page-title">Pure It Bowling — Card Generator</div>

<!-- CONTROLS BAR -->
<div class="controls-bar">
  <div class="ctrl-group">
    <label for="cardMode">Type</label>
    <select id="cardMode" onchange="updateMode()">
      <option value="league" selected>League</option>
      <option value="tournament">Tournament</option>
      <option value="newball">New Ball</option>
    </select>
  </div>
  <div class="ctrl-sep"></div>
  <div class="ctrl-group">
    <label for="showBlanks">Show Blanks</label>
    <label class="toggle"><input type="checkbox" id="showBlanks"><span class="slider"></span></label>
  </div>
  <div class="ctrl-sep"></div>
  <div class="ctrl-group">
    <label>Theme</label>
    <div class="swatch-wrap" id="swatchWrap">
      <div class="swatch active" data-color="#F07020" style="background:#F07020;" title="Orange" onclick="setTheme(this)"></div>
      <div class="swatch" data-color="#E02020" style="background:#E02020;" title="Red" onclick="setTheme(this)"></div>
      <div class="swatch" data-color="#1A7FD4" style="background:#1A7FD4;" title="Blue" onclick="setTheme(this)"></div>
      <div class="swatch" data-color="#18A050" style="background:#18A050;" title="Green" onclick="setTheme(this)"></div>
      <div class="swatch" data-color="#9B30C8" style="background:#9B30C8;" title="Purple" onclick="setTheme(this)"></div>
      <div class="swatch" data-color="#D4A010" style="background:#D4A010;" title="Gold" onclick="setTheme(this)"></div>
      <div class="swatch" data-color="#888888" style="background:#888888;" title="Gray" onclick="setTheme(this)"></div>
      <div class="swatch-custom" id="customSwatch" title="Custom color" style="background:conic-gradient(red,yellow,lime,cyan,blue,magenta,red);">
        <input type="color" id="customColorPicker" value="#F07020" oninput="setCustomTheme(this.value)" onchange="setCustomTheme(this.value)">
      </div>
    </div>
  </div>
</div>

<!-- TOP BAR INFO -->
<div class="card collapsible" id="topBarSection" style="display:none;">
  <div class="card-header" onclick="this.parentElement.classList.toggle('collapsed')">
    <span class="card-title">Top Bar</span>
  </div>
  <div class="card-body">
    <div class="row cols-2">
      <div class="ig"><label id="topBarNameLabel">League Name</label><input type="text" id="topBarName"/></div>
      <div class="ig"><label>City</label><input type="text" id="topBarCity"/></div>
    </div>
    <div class="row cols-3">
      <div class="ig"><label>State</label>
        <select id="topBarState">
          <option value="">-- State --</option>
          <option>AK</option><option>AL</option><option>AR</option><option>AZ</option>
          <option>CA</option><option>CO</option><option>CT</option><option>DC</option><option>DE</option>
          <option>FL</option><option>GA</option><option>HI</option>
          <option>IA</option><option>ID</option><option>IL</option><option>IN</option>
          <option>KS</option><option>KY</option><option>LA</option>
          <option>MA</option><option>MD</option><option>ME</option><option>MI</option><option>MN</option><option>MO</option><option>MS</option><option>MT</option>
          <option>NC</option><option>ND</option><option>NE</option><option>NH</option><option>NJ</option><option>NM</option><option>NV</option><option>NY</option>
          <option>OH</option><option>OK</option><option>OR</option><option>PA</option><option>RI</option>
          <option>SC</option><option>SD</option><option>TN</option><option>TX</option><option>UT</option>
          <option>VA</option><option>VT</option><option>WA</option><option>WI</option><option>WV</option><option>WY</option>
        </select>
      </div>
      <div class="ig"><label>Oil Pattern</label><input type="text" id="topBarOil"/></div>
      <div class="ig"><label>Date</label><input type="date" id="cardDate"/></div>
    </div>
  </div>
</div>

<!-- TOP BAR: New Ball -->
<div class="card collapsible" id="topBarNewBall" style="display:none;">
  <div class="card-header" onclick="this.parentElement.classList.toggle('collapsed')">
    <span class="card-title">Top Bar</span>
  </div>
  <div class="card-body">
    <div class="row cols-3">
      <div class="ig"><label>Brand</label><input type="text" id="nb_brand"/></div>
      <div class="ig"><label>Name</label><input type="text" id="nb_ballName"/></div>
      <div class="ig"><label>Weight (lbs.)</label><select id="nb_weight">
        <option value="" selected>--</option>
        <option>16</option>
        <option>15</option>
        <option>14</option>
        <option>13</option>
        <option>12</option>
        <option>11</option>
        <option>10</option>
        <option>9</option>
        <option>8</option>
        <option>7</option>
        <option>6</option>
      </select></div>
    </div>
  </div>
</div>

<!-- IMAGE UPLOAD -->
<div class="upload-zone" id="uploadZone">
  <input type="file" id="scoreImgInput" accept="image/*" onchange="handleUpload(event)">
  <div class="upload-label" id="uploadLabel"><span>Click to upload</span> your image</div>
</div>

<!-- LEFT BAR STATS (collapsible) -->
<div class="card collapsible" id="leftBarMain">
  <div class="card-header" onclick="this.parentElement.classList.toggle('collapsed')">
    <span class="card-title">Left Bar</span>
  </div>
  <div class="card-body">

    <!-- First Ball Avg -->
    <div class="stat-row">
      <label class="toggle"><input type="checkbox" id="show_fba" checked><span class="slider"></span></label>
      <div class="stat-inputs single">
        <div class="ig"><label>First Ball Avg</label><input type="text" id="fba"/></div>
      </div>
    </div>

    <!-- Strike % -->
    <div class="stat-row">
      <label class="toggle"><input type="checkbox" id="show_strike" checked><span class="slider"></span></label>
      <div class="stat-inputs triple">
        <div class="ig ig-pct"><label>Strike %</label><input type="text" id="strikeP"/></div>
        <div class="ig"><label>Made</label><input type="text" id="strikeMade"/></div>
        <div class="ig"><label>Attempts</label><input type="text" id="strikeAtt"/></div>
      </div>
    </div>

    <!-- Spare % -->
    <div class="stat-row">
      <label class="toggle"><input type="checkbox" id="show_spare" checked><span class="slider"></span></label>
      <div class="stat-inputs triple">
        <div class="ig ig-pct"><label>Spare %</label><input type="text" id="spareP"/></div>
        <div class="ig"><label>Made</label><input type="text" id="spareMade"/></div>
        <div class="ig"><label>Attempts</label><input type="text" id="spareAtt"/></div>
      </div>
    </div>

    <!-- Single Pin % -->
    <div class="stat-row">
      <label class="toggle"><input type="checkbox" id="show_single" checked><span class="slider"></span></label>
      <div class="stat-inputs triple">
        <div class="ig ig-pct"><label>Single Pin %</label><input type="text" id="singleP"/></div>
        <div class="ig"><label>Made</label><input type="text" id="singleMade"/></div>
        <div class="ig"><label>Attempts</label><input type="text" id="singleAtt"/></div>
      </div>
    </div>

    <!-- Multi Pin % -->
    <div class="stat-row">
      <label class="toggle"><input type="checkbox" id="show_multi" checked><span class="slider"></span></label>
      <div class="stat-inputs triple">
        <div class="ig ig-pct"><label>Multi Pin %</label><input type="text" id="multiP"/></div>
        <div class="ig"><label>Made</label><input type="text" id="multiMade"/></div>
        <div class="ig"><label>Attempts</label><input type="text" id="multiAtt"/></div>
      </div>
    </div>

    <!-- Split % -->
    <div class="stat-row">
      <label class="toggle"><input type="checkbox" id="show_split" checked><span class="slider"></span></label>
      <div class="stat-inputs triple">
        <div class="ig ig-pct"><label>Split %</label><input type="text" id="splitP"/></div>
        <div class="ig"><label>Made</label><input type="text" id="splitMade"/></div>
        <div class="ig"><label>Attempts</label><input type="text" id="splitAtt"/></div>
      </div>
    </div>

  </div>
</div>

<!-- BOTTOM BAR: League -->
<div class="card collapsible" id="bottomBarLeague">
  <div class="card-header" onclick="this.parentElement.classList.toggle('collapsed')">
    <span class="card-title">Bottom Bar</span>
  </div>
  <div class="card-body">
    <div class="stat-row">
      <label class="toggle"><input type="checkbox" id="show_avg" checked><span class="slider"></span></label>
      <div class="stat-inputs single">
        <div class="ig"><label>League Avg</label><input type="text" id="avg"/></div>

      </div>
    </div>
  </div>
</div>

  <div class="card-body">
    <div class="stat-row">
      <label class="toggle"><input type="checkbox" id="show_position" checked><span class="slider"></span></label>
      <div class="stat-inputs single">

      </div>
    </div>
    <div class="stat-row">
      <label class="toggle"><input type="checkbox" id="show_plusMinus" checked><span class="slider"></span></label>

        <div class="ig"><label>+/-</label><input type="text" id="plusMinus"/></div>
      </div>
    </div>
    <div class="stat-row">

    <div class="stat-row">

      </div>
    </div>
    <div class="stat-row">

      <div class="stat-inputs single">
        <div class="ig"><label>Total Pins</label><input type="text" id="totalPins"/></div>
      </div>
    </div>
  </div>
</div>

<!-- LEFT BAR STATS: New Ball (collapsible) -->
<div class="card collapsible" id="leftBarNewBall" style="display:none;">

  <div class="card-body">

      <label class="toggle"><input type="checkbox" id="show_speed" checked><span class="slider"></span></label>

<!-- BOTTOM BAR: New Ball -->
<div class="card collapsible" id="bottomBarNewBall" style="display:none;">
  <div class="card-header" onclick="this.parentElement.classList.toggle('collapsed')">
    <span class="card-title">Bottom Bar</span>
  </div>
  <div class="card-body">

    <!-- Layout Type selector -->
    <div style="background:#f8f8f8;border-radius:7px;border:1px solid #ebebeb;padding:8px 10px;margin-bottom:8px;">
      <div style="display:flex;align-items:center;gap:8px;">
        <label class="toggle" style="flex-shrink:0;"><input type="checkbox" id="show_layoutType" checked onchange="updateNewBallLayout()"><span class="slider"></span></label>
        <div class="stat-inputs single" style="flex:1;">
          <div class="ig">
            <label>Layout Type</label>
            <select id="nb_layoutType" onchange="updateNewBallLayout()">
              <option value="" selected>--</option>
              <option value="2ls">2LS</option>
              <option value="dualangle_asym">Dual Angle - Asymmetrical</option>
              <option value="dualangle_sym">Dual Angle - Symmetrical</option>
              <option value="vector">Vector</option>
            </select>
          </div>
        </div>
      </div>
      <div id="nb_layoutFields" style="margin-top:6px;padding-left:16px;border-left:3px solid #e0e0e0;display:none;">

    <!-- 2LS / Vector fields -->
    <div id="nb_layout_2ls">
      <div class="stat-row">
        <label class="toggle"><input type="checkbox" id="show_pinToPap" checked><span class="slider"></span></label>
        <div class="stat-inputs single">
          <div class="ig"><label>Pin-To-PAP</label><input type="text" id="nb_pinToPap"/></div>
        </div>
      </div>
      <div class="stat-row">
        <label class="toggle"><input type="checkbox" id="show_psaToPap" checked><span class="slider"></span></label>
        <div class="stat-inputs single">
          <div class="ig"><label>PSA-To-PAP</label><input type="text" id="nb_psaToPap"/></div>
        </div>

function handleUpload(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    const img = new Image();
    img.onload = () => {
      uploadedImg = img;
      const zone = document.getElementById('uploadZone');
      const label = document.getElementById('uploadLabel');
      const ex = zone.querySelector('.preview-thumb');
      if (ex) ex.remove();
      const thumb = document.createElement('img');
      thumb.src = ev.target.result;
      thumb.className = 'preview-thumb';
      zone.insertBefore(thumb, label);
      label.innerHTML = '<span>Change image</span>';
    };
    img.src = ev.target.result;
  };
  reader.readAsDataURL(file);
}

function val(id, fallback) { return document.getElementById(id).value || fallback; }
function rawVal(id) { return document.getElementById(id).value.trim(); }

let accentColor = '#F07020';

function setTheme(el) {
  accentColor = el.dataset.color;
  document.querySelectorAll('.swatch').forEach(s => s.classList.remove('active'));
  document.getElementById('customSwatch').classList.remove('active');
  el.classList.add('active');
  // Update UI accent (toggle on-color, page title, btn)
  document.documentElement.style.setProperty('--accent', accentColor);
  document.querySelectorAll('.slider').forEach(s => {
    s.style.setProperty('--sw-color', accentColor);
  });
  document.querySelector('.page-title').style.color = accentColor;
  document.querySelector('.btn').style.background = accentColor;
}

function setCustomTheme(color) {
  accentColor = color;
  document.querySelectorAll('.swatch').forEach(s => s.classList.remove('active'));
  const customSwatch = document.getElementById('customSwatch');
  customSwatch.classList.add('active');
  document.documentElement.style.setProperty('--accent', accentColor);
  document.querySelectorAll('.slider').forEach(s => {
    s.style.setProperty('--sw-color', accentColor);
  });
  document.querySelector('.page-title').style.color = accentColor;
  document.querySelector('.btn').style.background = accentColor;
}

function updateVisibility() {
  const mode = document.getElementById('cardMode').value;
  const showTop = true;
  document.getElementById('topBarSection').style.display    = (showTop && mode !== 'newball') ? 'block' : 'none';
  document.getElementById('topBarNewBall').style.display    = (showTop && mode === 'newball') ? 'block' : 'none';
  document.getElementById('leftBarMain').style.display         = mode !== 'newball'    ? 'block' : 'none';
  document.getElementById('leftBarNewBall').style.display      = mode === 'newball'    ? 'block' : 'none';
  document.getElementById('bottomBarLeague').style.display     = mode === 'league'     ? 'block' : 'none';
  document.getElementById('bottomBarTournament').style.display = mode === 'tournament' ? 'block' : 'none';
  document.getElementById('bottomBarNewBall').style.display    = mode === 'newball'    ? 'block' : 'none';
}

function updateNewBallLayout() {
  const layout = document.getElementById('nb_layoutType').value;
  const showLayout = document.getElementById('show_layoutType').checked && layout !== '';
  document.getElementById('nb_layoutFields').style.display          = showLayout ? 'block' : 'none';
  document.getElementById('nb_layout_2ls').style.display            = (showLayout && layout === '2ls')            ? 'block' : 'none';
  document.getElementById('nb_layout_dualangle_asym').style.display = (showLayout && layout === 'dualangle_asym') ? 'block' : 'none';
  document.getElementById('nb_layout_dualangle_sym').style.display  = (showLayout && layout === 'dualangle_sym')  ? 'block' : 'none';
  document.getElementById('nb_layout_vector').style.display         = (showLayout && layout === 'vector')         ? 'block' : 'none';
}

function updateMode() {
  const mode = document.getElementById('cardMode').value;
  const label = mode === 'tournament' ? 'Tournament Name' : 'League Name';
  document.getElementById('topBarNameLabel').textContent = label;
  updateVisibility();
}

let currentPlatform = { w: 1200, h: 630, name: 'Facebook' };

function selectPlatform(el) {
  document.querySelectorAll('.plat-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  currentPlatform = { w: +el.dataset.w, h: +el.dataset.h, name: el.dataset.name };
  generateCard();
}

function shareImage() {
  const canvas = document.getElementById('scoreCard');
  canvas.toBlob(async blob => {
    const file = new File([blob], 'pure-it-bowling-score.png', { type: 'image/png' });
    if (navigator.share && navigator.canShare && navigator.canShare({ files: [file] })) {
      try {
        await navigator.share({ files: [file], title: 'Pure It Bowling Score Card' });
      } catch(e) { if (e.name !== 'AbortError') fallbackCopy(canvas); }
    } else {
      fallbackCopy(canvas);
    }
  }, 'image/png');
}

function fallbackCopy(canvas) {
  const link = document.createElement('a');
  link.download = 'pure-it-bowling-score.png';
  link.href = canvas.toDataURL('image/png');
  link.click();
  alert('Share not supported on this browser — the image has been downloaded instead.');
}

function generateCard() {
  const mode = document.getElementById('cardMode').value;
  const showTopToggle = true;
  let topText, topParts;
  if (mode === 'newball') {
    const brandVal  = document.getElementById('nb_brand').value.trim();
    const ballName  = document.getElementById('nb_ballName').value.trim();
    const weightVal = document.getElementById('nb_weight').value.trim();
    topParts = [];
    if (brandVal)  topParts.push(brandVal);
    if (ballName)  topParts.push(ballName);
    if (weightVal) topParts.push(weightVal + ' lbs.');
    topText = topParts.join('  —  ');
  } else {
    // Gather top bar data first so we can check if anything is filled
    let nameVal, cityVal, stateVal, oilVal;
    nameVal  = document.getElementById('topBarName').value.trim();
    cityVal  = document.getElementById('topBarCity').value.trim();
    stateVal = document.getElementById('topBarState').value.trim();
    oilVal   = document.getElementById('topBarOil').value.trim();
    let locationPart = cityVal;
    if (cityVal && stateVal) locationPart = cityVal + ', ' + stateVal;
    else if (stateVal) locationPart = stateVal;
    topParts = [];
    if (nameVal) topParts.push(nameVal);
    if (locationPart) topParts.push(locationPart);
    if (oilVal) topParts.push(oilVal);
    // Add date if entered
    const dateRaw = document.getElementById('cardDate').value;
    if (dateRaw) {
      const [y, m, d] = dateRaw.split('-');
      topParts.push(m + '/' + d + '/' + y);
    }
    topText = topParts.join('  —  ');
  }
  const showTop = showTopToggle && topParts.length > 0;
  // Fixed design constants
  const TOP_H = showTop ? 60 : 0;
  const LEFT_W = 280;
  const BOT_H = 170;
  const FOOT_H = 46;
  const DESIGN_W = 1080;
  const DESIGN_H = 900 + TOP_H + FOOT_H;

  const TGT_W = currentPlatform.w;
  const TGT_H = currentPlatform.h;

  // For portrait targets, scale by width so design fills horizontally
  // and the image area grows taller. For landscape/square, scale by height.
  const isPortrait = TGT_H / TGT_W > DESIGN_H / DESIGN_W;
  const scale = isPortrait ? TGT_W / DESIGN_W : TGT_H / DESIGN_H;

  // W/H are design coordinates — image area absorbs leftover space
  const W = isPortrait ? DESIGN_W : Math.round(TGT_W / scale);
  const H = isPortrait ? Math.round(TGT_H / scale) : DESIGN_H;
  const ORANGE = accentColor;
  const BLACK = '#111111';
  const WHITE = '#FFFFFF';
  const GRAY = '#AAAAAA';

  const canvas = document.getElementById('scoreCard');
  canvas.width = TGT_W; canvas.height = TGT_H;
  const ctx = canvas.getContext('2d');

  // Apply uniform scale so design fills target height exactly
  ctx.save();
  ctx.scale(scale, scale);

  // Helper: draw text fitting within maxW, shrinking font size as needed
  function fitText(text, x, y, maxW, fontStr, minSize) {
    const match = fontStr.match(/(\d+)px/);
    if (!match) { ctx.font = fontStr; ctx.fillText(text, x, y); return; }
    let size = parseInt(match[1]);
    const min = minSize || 8;
    while (size >= min) {
      ctx.font = fontStr.replace(/\d+px/, size + 'px');
      if (ctx.measureText(text).width <= maxW) break;
      size -= 1;
    }
    ctx.fillText(text, x, y);
  }

  // White background
  ctx.fillStyle = WHITE;
  ctx.fillRect(0, 0, W, H);

  // Black bars
  ctx.fillStyle = BLACK;
  ctx.fillRect(0, TOP_H, LEFT_W, H - FOOT_H - BOT_H - TOP_H);
  ctx.fillRect(0, H - FOOT_H - BOT_H, W, BOT_H);

  // Top black bar (if enabled)
  if (showTop) {
    ctx.fillStyle = BLACK;
    ctx.fillRect(0, 0, W, TOP_H);
    ctx.textAlign = 'center';
    ctx.fillStyle = WHITE;
    fitText(topText, W / 2, TOP_H * 0.68, W - 40, "700 22px 'Barlow Condensed', sans-serif", 10);
  }

  // Score image area
  const scoreX = LEFT_W, scoreY = TOP_H, scoreW = W - LEFT_W, scoreH = H - FOOT_H - BOT_H - TOP_H;
  if (uploadedImg) {
    const imgAR = uploadedImg.naturalWidth / uploadedImg.naturalHeight;
    const boxAR = scoreW / scoreH;
    let dw, dh;
    if (imgAR > boxAR) { dw = scoreW * 0.90; dh = dw / imgAR; }
    else { dh = scoreH * 0.90; dw = dh * imgAR; }
    ctx.drawImage(uploadedImg, scoreX + (scoreW - dw) / 2, scoreY + (scoreH - dh) / 2, dw, dh);
  } else {
    ctx.fillStyle = '#ebebeb';
    ctx.fillRect(scoreX, scoreY, scoreW, scoreH);
  }

  // Orange borders — drawn after image, shifted inward by half lineWidth so they
  // don't bleed outside their intended edge
  const lw = 5;
  ctx.strokeStyle = ORANGE;
  ctx.lineWidth = lw;
  const half = lw / 2;
  const borderBottom = H - FOOT_H - BOT_H;
  // Vertical: left edge of image
  ctx.beginPath(); ctx.moveTo(LEFT_W + half, TOP_H); ctx.lineTo(LEFT_W + half, borderBottom); ctx.stroke();
  // Horizontal: top of bottom bar
  ctx.beginPath(); ctx.moveTo(LEFT_W, borderBottom - half); ctx.lineTo(W, borderBottom - half); ctx.stroke();
  if (showTop) {
    // Horizontal: bottom of top bar
    ctx.beginPath(); ctx.moveTo(0, TOP_H + half); ctx.lineTo(W, TOP_H + half); ctx.stroke();
    // Vertical: right edge of image
    ctx.beginPath(); ctx.moveTo(W - half, TOP_H); ctx.lineTo(W - half, borderBottom); ctx.stroke();
  }

  // LEFT BAR: up to 6 stats, filtered by toggle and Display Blanks
  const showBlanks = document.getElementById('showBlanks').checked;

  const allLeftStatDefs = mode === 'newball' ? [
    { id: 'show_span',    label: 'SPAN',          pctRaw: rawVal('nb_span'),    madeRaw: '', attRaw: '', isAvg: true },
    { id: 'show_pap',     label: 'PAP',           pctRaw: rawVal('nb_pap'),     madeRaw: '', attRaw: '', isAvg: true },
    { id: 'show_tilt',    label: 'TILT',          pctRaw: rawVal('nb_tilt'),    madeRaw: '', attRaw: '', isAvg: true },
    { id: 'show_axisrot', label: 'AXIS ROTATION', pctRaw: rawVal('nb_axisrot'), madeRaw: '', attRaw: '', isAvg: true },
    { id: 'show_speed',   label: 'SPEED',         pctRaw: rawVal('nb_speed'),   madeRaw: '', attRaw: '', isAvg: true },
    { id: 'show_revrate', label: 'REV RATE',      pctRaw: rawVal('nb_revrate'), madeRaw: '', attRaw: '', isAvg: true },
  ] : [
    { id: 'show_fba',    label: 'FIRST BALL AVG', pctRaw: rawVal('fba'),     madeRaw: '', attRaw: '', isAvg: true },
    { id: 'show_strike', label: 'STRIKE %',       pctRaw: rawVal('strikeP'), madeRaw: rawVal('strikeMade'), attRaw: rawVal('strikeAtt') },
    { id: 'show_spare',  label: 'SPARE %',        pctRaw: rawVal('spareP'),  madeRaw: rawVal('spareMade'),  attRaw: rawVal('spareAtt') },
    { id: 'show_single', label: 'SINGLE PIN %',   pctRaw: rawVal('singleP'), madeRaw: rawVal('singleMade'), attRaw: rawVal('singleAtt') },
    { id: 'show_multi',  label: 'MULTI PIN %',    pctRaw: rawVal('multiP'),  madeRaw: rawVal('multiMade'),  attRaw: rawVal('multiAtt') },
    { id: 'show_split',  label: 'SPLIT %',        pctRaw: rawVal('splitP'),  madeRaw: rawVal('splitMade'),  attRaw: rawVal('splitAtt') },
  ];
  const allLeftStats = allLeftStatDefs.map(s => {
    // Apply Display Blanks logic
    let pct, made, att;
    if (s.isAvg) {
      // First Ball Avg: hide if blank and showBlanks off
      if (!showBlanks && !s.pctRaw) return null;
      pct = s.pctRaw || '—';
      made = ''; att = '';
    } else {
      const hasPct  = !!s.pctRaw;
      const hasMade = !!s.madeRaw;
      const hasAtt  = !!s.attRaw;
      if (!showBlanks) {
        // Hide entire stat if main value is blank
        if (!hasPct) return null;
        // If main is filled but both made & att are blank, hide fraction entirely
        pct  = s.pctRaw + '%';
        made = (hasMade || hasAtt) ? (hasMade ? s.madeRaw : '') : '';
        att  = (hasMade || hasAtt) ? (hasAtt  ? s.attRaw  : '') : '';
      } else {
        pct  = (s.pctRaw  || '—') + '%';
        made = s.madeRaw || '—';
        att  = s.attRaw  || '—';
      }
    }
    return { ...s, pct, made, att };
  }).filter(s => s !== null && document.getElementById(s.id).checked);

  const leftStats = allLeftStats;

  const statAreaH = H - FOOT_H - BOT_H - TOP_H;
  const statCount = leftStats.length;
  const statH = statCount > 0 ? statAreaH / statCount : statAreaH;

  leftStats.forEach((s, i) => {
    const yTop = TOP_H + i * statH;
    const yMid = yTop + statH / 2;

    // Big pct/value
    ctx.textAlign = 'center';
    ctx.fillStyle = ORANGE;
    fitText(s.pct, LEFT_W / 2, yMid - 6, LEFT_W - 16, "900 46px 'Barlow Condensed', sans-serif", 14);

    // Made/Attempts fraction
    if (!s.isAvg && (s.made || s.att)) {
      let fraction;
      if (s.made && s.att) {
        fraction = s.made + ' / ' + s.att;
      } else if (s.made) {
        fraction = s.made + ' made';
      } else {
        fraction = s.att + ' att';
      }
      ctx.fillStyle = 'rgba(200,200,200,0.9)';
      fitText(fraction, LEFT_W / 2, yMid + 14, LEFT_W - 16, "700 14px 'Barlow', sans-serif", 8);
    }

    // Label
    ctx.fillStyle = GRAY;
    fitText(s.label, LEFT_W / 2, yMid + (s.isAvg ? 20 : 34), LEFT_W - 16, "700 16px 'Barlow', sans-serif", 8);

    // Divider
    if (i < leftStats.length - 1) {
      ctx.strokeStyle = 'rgba(255,255,255,0.1)';
      ctx.lineWidth = 1;
      ctx.beginPath(); ctx.moveTo(16, yTop + statH); ctx.lineTo(LEFT_W - 16, yTop + statH); ctx.stroke();
    }
  });

  // BOTTOM BAR: logo left, stats right (conditional on mode)
  const botY = H - FOOT_H - BOT_H;
  if (logoImg.complete && logoImg.naturalWidth > 0) {
    const maxH = BOT_H - 14;
    const maxW = LEFT_W - 16;
    const ar = logoImg.naturalWidth / logoImg.naturalHeight;
    let lw = maxW, lh = lw / ar;
    if (lh > maxH) { lh = maxH; lw = lh * ar; }
    ctx.drawImage(logoImg, (LEFT_W - lw) / 2, botY + (BOT_H - lh) / 2, lw, lh);
  }

  let botStats;
  if (mode === 'league') {
    botStats = [
      { id: 'show_avg',        label: 'LEAGUE AVERAGE', raw: rawVal('avg') },
      { id: 'show_highGame',   label: 'HIGH GAME',      raw: rawVal('highGame') },
      { id: 'show_highSeries', label: 'HIGH SERIES',    raw: rawVal('highSeries') },
    ];
  } else if (mode === 'tournament') {
    botStats = [
      { id: 'show_position',  label: 'POSITION',   raw: rawVal('position') },
      { id: 'show_plusMinus', label: '+/-',        raw: rawVal('plusMinus') },
      { id: 'show_tAvg',      label: 'AVERAGE',    raw: rawVal('tAvg') },
      { id: 'show_tHighGame', label: 'HIGH GAME',  raw: rawVal('tHighGame') },
      { id: 'show_totalPins', label: 'TOTAL PINS', raw: rawVal('totalPins') },
    ];
  } else {
    // New Ball — layout type determines which fields appear
    const layout = document.getElementById('nb_layoutType').value;
    if (layout === '2ls') {
      botStats = [
        { id: 'show_pinToPap',  label: 'PIN-TO-PAP',  raw: rawVal('nb_pinToPap') },
        { id: 'show_psaToPap',  label: 'PSA-TO-PAP',  raw: rawVal('nb_psaToPap') },
        { id: 'show_pinBuffer', label: 'PIN BUFFER',  raw: rawVal('nb_pinBuffer') },
      ];
    } else if (layout === 'dualangle_asym') {
      botStats = [
        { id: 'show_drillingAngle', label: 'DRILLING ANGLE', raw: rawVal('nb_drillingAngle') },
        { id: 'show_daPinToPap',    label: 'PIN-TO-PAP',     raw: rawVal('nb_daPinToPap') },
        { id: 'show_valAngle',      label: 'VAL ANGLE',      raw: rawVal('nb_valAngle') },
      ];
    } else if (layout === 'dualangle_sym') {
      botStats = [
        { id: 'show_symPinToPap',  label: 'PIN-TO-PAP', raw: rawVal('nb_symPinToPap') },
        { id: 'show_symValAngle',  label: 'VAL ANGLE',  raw: rawVal('nb_symValAngle') },
      ];
    } else {
      botStats = [
        { id: 'show_vPinToPap',  label: 'PIN-TO-PAP',  raw: rawVal('nb_vPinToPap') },
        { id: 'show_vPsaToPap',  label: 'PSA-TO-PAP',  raw: rawVal('nb_vPsaToPap') },
        { id: 'show_vPinBuffer', label: 'PIN BUFFER',  raw: rawVal('nb_vPinBuffer') },
      ];
    }
  }
  botStats = botStats
    .filter(s => document.getElementById(s.id).checked)
    .filter(s => showBlanks || s.raw)
    .map(s => ({ ...s, value: s.raw || '—' }));

  if (mode === 'newball') {
    const layout = document.getElementById('nb_layoutType').value;
    const showLayout = document.getElementById('show_layoutType').checked;

    // Collect spec stats (Coverstock, RG, Diff, Int. Diff)
    const coverstockRaw = document.getElementById('nb_coverstock').value;
    const specStats = [
      { id: 'show_coverstock', label: 'COVERSTOCK', raw: coverstockRaw },
      { id: 'show_rg',         label: 'RG',         raw: rawVal('nb_rg') },
      { id: 'show_diff',       label: 'DIFF',       raw: rawVal('nb_diff') },
      { id: 'show_intdiff',    label: 'INT. DIFF',  raw: rawVal('nb_intdiff') },
    ].filter(s => document.getElementById(s.id).checked)
     .filter(s => showBlanks || s.raw)
     .map(s => ({ ...s, value: s.raw || '—' }));

    const hasLayout = showLayout && botStats.length > 0;
    const hasSpecs  = specStats.length > 0;
    const rightW = W - LEFT_W;

    // Build a unified list of slots: layout = 1 slot, each spec = 1 slot
    // Layout slot renders name+values+labels stacked; spec slots render value+label
    const layoutLabel = layout === '2ls' ? '2LS'
      : layout === 'dualangle_asym' ? 'DUAL ANGLE - ASYMMETRICAL'
      : layout === 'dualangle_sym'  ? 'DUAL ANGLE - SYMMETRICAL'
      : 'VECTOR';

    const totalSlots = (hasLayout ? 1 : 0) + (hasSpecs ? specStats.length : 0);

    const slotW = totalSlots > 0 ? rightW / totalSlots : 0;
    let slotIndex = 0;

    // Draw divider helper
    function drawDivider(x) {
      ctx.strokeStyle = 'rgba(255,255,255,0.15)';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(x, botY + 20);
      ctx.lineTo(x, botY + BOT_H - 20);
      ctx.stroke();
    }

    if (hasLayout) {
      const cx = LEFT_W + slotIndex * slotW + slotW / 2;
      const valStr = botStats.map(s => s.value).join('  X  ');
      ctx.textAlign = 'center';
      ctx.fillStyle = WHITE;
      fitText(valStr, cx, botY + BOT_H * 0.58, slotW - 12, "900 46px 'Barlow Condensed', sans-serif", 14);
      ctx.fillStyle = ORANGE;
      fitText(layoutLabel, cx, botY + BOT_H * 0.84, slotW - 12, "700 16px 'Barlow', sans-serif", 8);
      slotIndex++;
      if (hasSpecs) drawDivider(LEFT_W + slotIndex * slotW);
    }

    specStats.forEach((s, i) => {
      const cx = LEFT_W + slotIndex * slotW + slotW / 2;
      if (slotIndex > 0 && i > 0) drawDivider(LEFT_W + slotIndex * slotW);
      ctx.textAlign = 'center';
      ctx.fillStyle = WHITE;
      fitText(s.value, cx, botY + BOT_H * 0.58, slotW - 12, "900 52px 'Barlow Condensed', sans-serif", 14);
      ctx.fillStyle = ORANGE;
      fitText(s.label, cx, botY + BOT_H * 0.84, slotW - 12, "700 16px 'Barlow', sans-serif", 8);
      slotIndex++;
    });
  } else {
    const slotW = botStats.length > 0 ? (W - LEFT_W) / botStats.length : W - LEFT_W;
    botStats.forEach((s, i) => {
      const cx = LEFT_W + i * slotW + slotW / 2;
      if (i > 0) {
        ctx.strokeStyle = 'rgba(255,255,255,0.12)';
        ctx.lineWidth = 1;
        ctx.beginPath(); ctx.moveTo(LEFT_W + i * slotW, botY + 20); ctx.lineTo(LEFT_W + i * slotW, botY + BOT_H - 20); ctx.stroke();
      }
      ctx.textAlign = 'center';
      ctx.fillStyle = WHITE;
      fitText(s.value, cx, botY + BOT_H * 0.58, slotW - 12, "900 58px 'Barlow Condensed', sans-serif", 14);
      ctx.fillStyle = ORANGE;
      fitText(s.label, cx, botY + BOT_H * 0.84, slotW - 12, "700 18px 'Barlow', sans-serif", 8);
    });
  }

  // FOOTER BAR: full width, black, with accent border on top
  const footY = H - FOOT_H;
  ctx.fillStyle = BLACK;
  ctx.fillRect(0, footY, W, FOOT_H);
  ctx.strokeStyle = ORANGE;
  ctx.lineWidth = 3;
  ctx.beginPath(); ctx.moveTo(0, footY); ctx.lineTo(W, footY); ctx.stroke();

  // Three info items spaced evenly across footer
  const footItems = [
    'https://pureitbowling.com/',
    '14D East Main Street  Ephrata, PA 17522',
    '(717) 679-8225'
  ];
  const footSlotW = W / footItems.length;
  ctx.fillStyle = 'rgba(220,220,220,0.9)';
  ctx.textAlign = 'center';
  footItems.forEach((txt, i) => {
    const cx = i * footSlotW + footSlotW / 2;
    fitText(txt, cx, footY + FOOT_H * 0.64, footSlotW - 16, "500 15px 'Barlow', sans-serif", 8);
  });

  document.getElementById('platformWrap').style.display = 'block';
  document.getElementById('cardWrap').style.display = 'block';
  ctx.restore();
  document.getElementById('cardWrap').scrollIntoView({behavior:'smooth', block:'start'});
  const dataUrl = canvas.toDataURL('image/png');
  const dlBtn = document.getElementById('dlBtn');
  dlBtn.href = dataUrl;
  dlBtn.download = 'pure-it-bowling-' + currentPlatform.name.toLowerCase().replace(/[^a-z0-9]+/g,'-') + '.png';
}
updateMode();
document.documentElement.style.setProperty('--accent', accentColor);
</script>
</body>
</html>
